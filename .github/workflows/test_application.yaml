name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - name: Get repository code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Copy env file
        run: cp .env.example .env

      - name: Build image with GHA cache
        uses: docker/build-push-action@v6
        with:
          context: .
          load: true
          tags: backend_chmnu_schedule:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Start test stack
        run: docker compose --env-file .env -f docker_compose/test.yaml up -d

      - name: Wait for postgres
        run: |
          until docker exec chmnu-db pg_isready -h localhost; do sleep 2; done

      - name: Run migrations
        run: docker exec main-app python manage.py migrate

      - name: Run tests with coverage
        run: docker exec main-app pytest --cov=core --cov-report=term-missing

      - name: Dependency vulnerability scan
        continue-on-error: true
        run: docker exec main-app pip-audit
