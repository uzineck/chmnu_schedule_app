services:
  main-app:
    build:
      context: ..
      dockerfile: Dockerfile
      target: dev
    image: backend_chmnu_schedule:dev
    container_name: main-app
    command: "sh /entrypoint.sh"
    env_file:
      - ../.env
    environment:
      DJANGO_ENV: dev
      DJANGO_SETTINGS_MODULE: core.project.settings.dev
    depends_on:
      - postgres
    volumes:
      - static:/app/static/
      - ..:/app/
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8000/api/v1/ping/ || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    restart: unless-stopped

  scheduler:
    image: backend_chmnu_schedule:dev
    build:
      context: ..
      dockerfile: Dockerfile
      target: dev
    container_name: scheduler
    command: "python manage.py runscheduler"
    env_file:
      - ../.env
    environment:
      DJANGO_ENV: dev
      DJANGO_SETTINGS_MODULE: core.project.settings.dev
      BACKUP_DIR: /backups
      BACKUP_RETENTION_DAYS: ${BACKUP_RETENTION_DAYS:-30}
    depends_on:
      - postgres
    volumes:
      - ..:/app/
      - ${BACKUP_DIR:-../backups}:/backups
    restart: unless-stopped

  proxy:
    build: ../nginx
    container_name: proxy
    ports:
      - "80:80"
      - "81:81"
    depends_on:
      - main-app
    volumes:
      - static:/static/
      - ../nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost/api/v1/ping/ || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 40s
    restart: unless-stopped

volumes:
  static:
