services:
  main-app:
    build:
      context: ..
      dockerfile: Dockerfile
      target: runtime
    image: backend_chmnu_schedule:latest
    container_name: main-app
    command: "sh /entrypoint.sh"
    env_file:
      - ../.env
    environment:
      DJANGO_ENV: prod
      DJANGO_SETTINGS_MODULE: core.project.settings.prod
      GUNICORN_WORKERS: ${GUNICORN_WORKERS:-4}
    depends_on:
      - postgres
    volumes:
      - static:/app/static/
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8000/api/v1/ping/ || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    restart: unless-stopped

  scheduler:
    image: backend_chmnu_schedule:latest
    build:
      context: ..
      dockerfile: Dockerfile
      target: runtime
    container_name: scheduler
    command: "python manage.py runscheduler"
    env_file:
      - ../.env
    environment:
      DJANGO_ENV: prod
      DJANGO_SETTINGS_MODULE: core.project.settings.prod
      BACKUP_DIR: /backups
      BACKUP_RETENTION_DAYS: ${BACKUP_RETENTION_DAYS:-30}
    depends_on:
      - postgres
    volumes:
      - ${BACKUP_DIR:-../backups}:/backups
    restart: unless-stopped

  proxy:
    build:
      context: ../nginx
      dockerfile: Dockerfile.prod
    container_name: proxy
    environment:
      DOMAIN: ${DOMAIN}
    ports:
      - "80:80"
      - "443:443"
      - "127.0.0.1:81:81"
    depends_on:
      - main-app
    volumes:
      - static:/static/
      - certbot_certs:/etc/letsencrypt:ro
      - certbot_webroot:/var/www/certbot:ro
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS -k https://localhost/api/v1/ping/ || curl -fsS http://localhost/api/v1/ping/ || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 40s
    restart: unless-stopped

  certbot:
    image: certbot/certbot:latest
    container_name: certbot
    volumes:
      - certbot_certs:/etc/letsencrypt
      - certbot_webroot:/var/www/certbot
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew --webroot --webroot-path=/var/www/certbot --quiet; sleep 12h & wait $${!}; done;'"
    restart: unless-stopped

volumes:
  static:
  certbot_certs:
  certbot_webroot:
