services:
  main-app:
    build:
      context: ..
      dockerfile: Dockerfile
    image: backend_chmnu_schedule:latest
    container_name: main-app
    ports:
      - "${DJANGO_PORT}:8000"
    command: "sh /entrypoint.sh"
    env_file:
      - ../.env
    environment:
      DJANGO_ENV: prod
      DJANGO_SETTINGS_MODULE: core.project.settings.prod
      GUNICORN_WORKERS: ${GUNICORN_WORKERS:-4}
    depends_on:
      - postgres
    volumes:
      - static:/app/static/
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8000/api/v1/ping/ || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    restart: unless-stopped

  proxy:
    build: ../nginx
    container_name: proxy
    ports:
      - "80:80"
    depends_on:
      - main-app
    volumes:
      - static:/static/
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost/api/v1/ping/ || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 40s
    restart: unless-stopped

volumes:
  static:
